name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run engine unit tests
        run: node --test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e tests
        run: npx playwright test
      # test-results/ is only populated for failed or retried tests, so on a
      # flake that passes on retry (green job) this still captures the trace.
      - name: Upload traces of failed or retried tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  e2e-ios:
    # Required iOS/WebKit lane for touch, focus, and compact-viewport regressions.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps webkit
      - name: Run iOS/WebKit mobile tests
        run: npm run test:e2e:ios
